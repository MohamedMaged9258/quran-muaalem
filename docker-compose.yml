services:
  triton:
    build: ./engine/triton
    volumes:
      - ./engine/triton/model_repository:/models
      # Mount scripts so they can be updated without rebuild
      - ./engine/triton/entry-level.sh:/opt/entry-level.sh
      - ./engine/triton/entrypoint.sh:/opt/entrypoint.sh
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

